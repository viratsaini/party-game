name: Build Android APK

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build Android APK

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Godot files
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/godot/**
            /usr/local/bin/godot
            ~/.config/godot/**
          key: ${{ runner.os }}-godot-${{ hashFiles('**/project.godot') }}
          restore-keys: |
            ${{ runner.os }}-godot-

      - name: Download and setup Godot
        run: |
          export GODOT_VERSION="4.3-stable"
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}_linux.x86_64.zip
          chmod +x Godot_v${GODOT_VERSION}_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot

      - name: Download Godot Export Templates
        run: |
          export GODOT_VERSION="4.3-stable"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}/
          rm -rf templates

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          sdkmanager "build-tools;33.0.0" "platforms;android-33" "cmdline-tools;latest" "ndk;25.2.9519653"

      - name: Export Android APK
        run: |
          mkdir -p export
          godot --headless --export-debug "Android" export/BattleZoneParty.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BattleZoneParty-Android-APK
          path: export/BattleZoneParty.apk
          retention-days: 30

      - name: Upload APK to repository
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/'))
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add export/BattleZoneParty.apk
          git commit -m "Update APK build [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
