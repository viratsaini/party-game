<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150" viewBox="0 0 400 150">
  <defs>
    <!-- Primary Button Gradient -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3380F2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2860C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A4B99;stop-opacity:1" />
    </linearGradient>

    <!-- Inner highlight -->
    <linearGradient id="innerHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.25" />
      <stop offset="40%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Outer glow -->
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#4D99FF" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Button body with shadow -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="url(#primaryGradient)" filter="url(#dropShadow)"/>

  <!-- Border -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="none" stroke="#66A3FF" stroke-width="2.5" stroke-opacity="0.7"/>

  <!-- Inner highlight overlay -->
  <rect x="22" y="17" width="356" height="60" rx="18" ry="18"
        fill="url(#innerHighlight)"/>
</svg>
