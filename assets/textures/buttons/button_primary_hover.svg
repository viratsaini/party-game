<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150" viewBox="0 0 400 150">
  <defs>
    <!-- Primary Hover Gradient (brighter) -->
    <linearGradient id="primaryHoverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4D99FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3375E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2560B3;stop-opacity:1" />
    </linearGradient>

    <!-- Enhanced inner highlight -->
    <linearGradient id="innerHighlightHover" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.35" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.05" />
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Enhanced outer glow for hover -->
    <filter id="outerGlowHover" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#66B3FF" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow layer -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="#4D99FF" fill-opacity="0.15" filter="url(#outerGlowHover)"/>

  <!-- Button body with shadow -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="url(#primaryHoverGradient)" filter="url(#dropShadow)"/>

  <!-- Bright border -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="none" stroke="#80BFFF" stroke-width="3" stroke-opacity="0.9"/>

  <!-- Inner highlight overlay -->
  <rect x="22" y="17" width="356" height="60" rx="18" ry="18"
        fill="url(#innerHighlightHover)"/>
</svg>
