<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150" viewBox="0 0 400 150">
  <defs>
    <!-- Success Button Gradient -->
    <linearGradient id="successGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#33CC59;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#28A347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A8033;stop-opacity:1" />
    </linearGradient>

    <!-- Inner highlight -->
    <linearGradient id="innerHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.25" />
      <stop offset="40%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Button body with shadow -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="url(#successGradient)" filter="url(#dropShadow)"/>

  <!-- Border -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="none" stroke="#66E580" stroke-width="2.5" stroke-opacity="0.7"/>

  <!-- Inner highlight overlay -->
  <rect x="22" y="17" width="356" height="60" rx="18" ry="18"
        fill="url(#innerHighlight)"/>
</svg>
