<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150" viewBox="0 0 400 150">
  <defs>
    <!-- Primary Pressed Gradient (darker, inverted) -->
    <linearGradient id="primaryPressedGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#153D7A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A4B99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2254A6;stop-opacity:1" />
    </linearGradient>

    <!-- Inner shadow for pressed effect -->
    <linearGradient id="innerShadowPressed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.3" />
      <stop offset="30%" style="stop-color:#000000;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Button body (no outer shadow, pressed in) -->
  <rect x="20" y="18" width="360" height="120" rx="20" ry="20"
        fill="url(#primaryPressedGradient)"/>

  <!-- Border -->
  <rect x="20" y="18" width="360" height="120" rx="20" ry="20"
        fill="none" stroke="#4080CC" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Inner shadow overlay -->
  <rect x="22" y="20" width="356" height="60" rx="18" ry="18"
        fill="url(#innerShadowPressed)"/>
</svg>
