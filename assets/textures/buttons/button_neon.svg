<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150" viewBox="0 0 400 150">
  <defs>
    <!-- Neon cyan glow -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dark gradient fill -->
    <linearGradient id="neonFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#050510;stop-opacity:0.98" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="url(#neonFill)"/>

  <!-- Neon border with glow -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="none" stroke="#00FFE6" stroke-width="3" filter="url(#neonGlow)"/>

  <!-- Inner subtle line -->
  <rect x="25" y="20" width="350" height="110" rx="16" ry="16"
        fill="none" stroke="#00FFE6" stroke-width="1" stroke-opacity="0.3"/>
</svg>
