<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="150" viewBox="0 0 400 150">
  <defs>
    <!-- Disabled Button Gradient -->
    <linearGradient id="disabledGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#404047;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#2E2E33;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Button body (no shadow) -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="url(#disabledGradient)"/>

  <!-- Muted border -->
  <rect x="20" y="15" width="360" height="120" rx="20" ry="20"
        fill="none" stroke="#595960" stroke-width="2" stroke-opacity="0.4"/>
</svg>
