<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Controller body -->
  <g fill="#F2F2F2" filter="url(#glow)">
    <!-- Main body -->
    <rect x="10" y="20" width="44" height="24" rx="8"/>
    <!-- Left grip -->
    <rect x="8" y="28" width="8" height="20" rx="4"/>
    <!-- Right grip -->
    <rect x="48" y="28" width="8" height="20" rx="4"/>
    <!-- D-pad (left side) -->
    <rect x="16" y="28" width="3" height="12" fill="#1A1A26"/>
    <rect x="13" y="31" width="12" height="3" fill="#1A1A26"/>
    <!-- Buttons (right side) -->
    <circle cx="44" cy="28" r="3" fill="#1A1A26"/>
    <circle cx="50" cy="32" r="3" fill="#1A1A26"/>
    <circle cx="44" cy="36" r="3" fill="#1A1A26"/>
    <circle cx="38" cy="32" r="3" fill="#1A1A26"/>
  </g>
</svg>
