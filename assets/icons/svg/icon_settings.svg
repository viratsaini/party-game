<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Gear with teeth -->
  <g fill="#F2F2F2" filter="url(#glow)">
    <circle cx="32" cy="32" r="12" fill="none" stroke="#F2F2F2" stroke-width="4"/>
    <!-- Gear teeth -->
    <rect x="30" y="6" width="4" height="10" rx="1"/>
    <rect x="30" y="48" width="4" height="10" rx="1"/>
    <rect x="6" y="30" width="10" height="4" rx="1"/>
    <rect x="48" y="30" width="10" height="4" rx="1"/>
    <!-- Diagonal teeth -->
    <rect x="14" y="11" width="4" height="10" rx="1" transform="rotate(45 16 16)"/>
    <rect x="46" y="43" width="4" height="10" rx="1" transform="rotate(45 48 48)"/>
    <rect x="43" y="14" width="10" height="4" rx="1" transform="rotate(45 48 16)"/>
    <rect x="11" y="46" width="10" height="4" rx="1" transform="rotate(45 16 48)"/>
    <!-- Center hole -->
    <circle cx="32" cy="32" r="4" fill="#1A1A26"/>
  </g>
</svg>
